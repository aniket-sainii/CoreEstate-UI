<div class="container" *ngIf="form">

    <h2>Add / Edit Flat</h2>
    <p *ngIf="buildingId">Adding flat to Building ID: <strong>{{buildingId}}</strong></p>

    <form [formGroup]="form" (ngSubmit)="submit()">

        <!-- BASIC DETAILS -->
        <div class="form-grid">

            <div>
                <label>Name *</label>
                <input formControlName="name" placeholder="Flat Name (e.g. 101)" />

            </div>

            <div>
                <label>Configuration *</label>
                <select formControlName="configurationId">
                    <option [ngValue]="null">Select</option>
                    <option *ngFor="let c of configurations" [ngValue]="c.id">{{ c.name }}</option>
                </select>
                <span class="text-muted small" *ngIf="form.get('configurationId')?.value">
                    (ID: {{form.get('configurationId')?.value}})
                </span>
            </div>

            <div>
                <label>Facing *</label>
                <select formControlName="facingId">
                    <option [ngValue]="null">Select</option>
                    <option *ngFor="let f of facings" [ngValue]="f.id">{{ f.name }}</option>
                </select>
                <span class="text-muted small" *ngIf="form.get('facingId')?.value">
                    (ID: {{form.get('facingId')?.value}})
                </span>
            </div>


            <div>
                <label>Floor No *</label>
                <input type="number" formControlName="floorNo" />
            </div>

            <div>
                <label>Carpet Area *</label>
                <input type="number" formControlName="carpetArea" />
            </div>

            <div>
                <label>Sale Area *</label>
                <input type="number" formControlName="saleArea" />
            </div>

        </div>

        <!-- FLAT COSTS -->
        <h3>Flat Costs</h3>

        <div formArrayName="flatCosts">

            <div class="cost-row" *ngFor="let cost of flatCosts.controls; let i = index" [formGroupName]="i">

                <div>
                    <label>Title *</label>
                    <input formControlName="title" />
                </div>

                <div>
                    <label>Amount</label>
                    <input type="number" formControlName="amount" />
                </div>

                <div>
                    <label>Cost Type *</label>
                    <select formControlName="costTypeId">
                        <option [ngValue]="null">Select</option>
                        <option *ngFor="let ct of costTypes" [ngValue]="ct.id">{{ ct.name }}</option>
                    </select>
                    <span class="text-muted small" *ngIf="cost.get('costTypeId')?.value">
                        (ID: {{cost.get('costTypeId')?.value}})
                    </span>
                </div>

                <div class="actions">
                    <button type="button" (click)="removeCost(i)">✕</button>
                </div>

            </div>

        </div>

        <!-- ADD COST BUTTON -->
        <div class="actions">
            <button type="button" (click)="addCost()">+ Add Cost</button>
        </div>

        <!-- SUBMIT -->
        <button type="submit" class="save-btn">
            Save Flat
        </button>

    </form>

</div>
