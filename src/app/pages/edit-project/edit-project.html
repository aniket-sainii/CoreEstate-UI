<div class="row justify-content-center" *ngIf="isLoaded">
  <div class="col-lg-10">
    <div class="page-header mt-4">
      <div>
        <h2 class="fw-bold mb-0">Project Configuration</h2>
        <p class="text-muted mb-0">
          Editing Project ID: <span class="badge bg-primary">#{{projectId}}</span>
        </p>
      </div>
      <a routerLink="/" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-1"></i>Back up
      </a>
    </div>

    <form [formGroup]="projectForm" (ngSubmit)="updateProject()">
      <!-- PROJECT DETAILS -->
      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-white py-3">
          <h5 class="card-title mb-0 fw-bold text-primary">
            <i class="bi bi-info-circle me-2"></i>Project Details
          </h5>
        </div>
        <div class="card-body p-4">
          <div class="mb-3">
            <label class="form-label">Project Name <span class="text-danger">*</span></label>
            <input formControlName="name" class="form-control" placeholder="e.g. Skyline Residency" />
            <div class="invalid-feedback d-block" *ngIf="projectForm.get('name')?.invalid && projectForm.get('name')?.touched">
              Name is required.
            </div>
          </div>

          <div>
            <label class="form-label">Description <span class="text-danger">*</span></label>
            <textarea formControlName="description" class="form-control" rows="3" placeholder="Brief overview of the project..."></textarea>
            <div class="invalid-feedback d-block" *ngIf="projectForm.get('description')?.invalid && projectForm.get('description')?.touched">
              Description is required.
            </div>
          </div>
        </div>
      </div>

      <!-- BUILDINGS -->
      <div class="card mb-4 shadow-sm">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
          <h5 class="card-title mb-0 fw-bold text-primary">
            <i class="bi bi-building me-2"></i>Building Composition
          </h5>
          <button type="button" class="btn btn-sm btn-outline-primary" (click)="addBuilding()">
            <i class="bi bi-plus-lg me-1"></i>Add Building
          </button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th class="ps-4" style="width: 30%;">Building Name <span class="text-danger">*</span></th>
                  <th style="width: 55%;">Description <span class="text-danger">*</span></th>
                  <th class="text-center" style="width: 15%;">Actions</th>
                </tr>
              </thead>
              <tbody formArrayName="buildings">
                <tr *ngFor="let buildingCtrl of buildings.controls; let i = index" [formGroupName]="i">
                  <td class="ps-4">
                    <input formControlName="name" class="form-control form-control-sm" placeholder="e.g. Block A" />
                    <div class="invalid-feedback d-block small" *ngIf="buildingCtrl.get('name')?.invalid && buildingCtrl.get('name')?.touched">
                      Required
                    </div>
                  </td>
                  <td>
                    <textarea formControlName="description" class="form-control form-control-sm" rows="1" placeholder="Building specs..."></textarea>
                    <div class="invalid-feedback d-block small" *ngIf="buildingCtrl.get('description')?.invalid && buildingCtrl.get('description')?.touched">
                      Required
                    </div>
                  </td>
                  <td class="text-center">
                    <div class="btn-group">
                      <button type="button" class="btn btn-sm btn-outline-danger border-0" (click)="removeBuilding(i)">
                        <i class="bi bi-trash"></i>
                      </button>
                    </div>
                  </td>
                </tr>
                <tr *ngIf="buildings.length === 0">
                  <td colspan="3" class="text-center py-4 text-muted">
                    No buildings defined for this project. Click "Add Building" to begin.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- FOOTER ACTIONS -->
      <div class="d-flex justify-content-end gap-3 mb-5">
        <button type="button" routerLink="/" class="btn btn-light btn-lg px-4">Discard Changes</button>
        <button type="submit" class="btn btn-primary btn-lg px-5 shadow-sm">
           <i class="bi bi-save me-2"></i>Update Project
        </button>
      </div>
    </form>
  </div>
</div>
