<div class="row justify-content-center align-items-center min-vh-100">
  <div class="col-md-5">
    <div class="card shadow-lg">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <i class="bi bi-person-circle display-4 text-primary mb-3"></i>
          <h2 class="fw-bold">Welcome Back</h2>
          <p class="text-muted">Please enter your credentials to login</p>
        </div>

        <form (ngSubmit)="submit()">
          <div class="form-floating mb-3">
            <input id="email" type="email" class="form-control" [(ngModel)]="email" name="email" placeholder="name@example.com" required />
            <label for="email">Email address</label>
          </div>

          <div class="form-floating mb-3">
            <input id="password" type="password" class="form-control" [(ngModel)]="password" name="password" placeholder="Password" required />
            <label for="password">Password</label>
          </div>

          @if(error){
            <div class="alert alert-danger py-2 mb-3">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error }}
            </div>
          }

          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
              <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
              Login
            </button>
          </div>
        </form>

        <div class="text-center mt-4">
          <p class="mb-0 text-muted">Don't have an account?</p>
          <a class="btn btn-link link-primary fw-semibold" [routerLink]="['/register']">Create an Account</a>
        </div>
      </div>
    </div>
  </div>
</div>
